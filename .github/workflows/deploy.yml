name: Deploy web viz to Cloudflare Pages

# Auto-deploy the WebAssembly order-book visualizer (web/app) to Cloudflare Pages
# on every push to main. The C++ -> WASM (web/app/public/ob.{js,wasm}) is committed,
# so CI only needs the Vite build, no Emscripten toolchain.

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/app/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/app
          command: pages deploy dist --project-name=orderbook --branch=main
