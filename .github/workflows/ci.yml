name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure + build (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Every test under ASan + UBSan: use-after-free, OOB, leaks, and undefined
      # behaviour on top of the correctness oracle (differential fuzz, occupancy
      # bitmap, flat map, allocation audit). FUZZ_EXTRA_SEED varies per run so CI
      # explores a new trajectory every time (fixed seeds alone replay forever);
      # the seed is printed on divergence for local reproduction.
      - name: asan + ubsan
        run: |
          for t in test_orderbook test_occupancy test_flat_id_map test_alloc_audit; do
            c++ -std=c++20 -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
                -DFUZZ_OPS=20000 -DFUZZ_EXTRA_SEED=${{ github.run_id }}ull \
                -Iinclude -Itests tests/$t.cpp -o $t.asan
            ./$t.asan
          done

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build + run benchmark
        run: |
          c++ -std=c++20 -O3 -DNDEBUG -march=native -Iinclude bench/bench.cpp -o ob_bench
          ./ob_bench

  # The web demo is the engine's most visible consumer; without this job the wasm
  # target sits entirely outside the "CI green" evidence.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - name: compile engine + bindings to wasm
        run: ./web/build-wasm.sh
      - name: typecheck + build the app
        run: |
          cd web/app
          npm ci
          npx tsc --noEmit
          npm run build
